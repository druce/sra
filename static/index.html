<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRA4 — Stock Research Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #07090f;
      --surface:     #0c1220;
      --surface-2:   #101928;
      --surface-3:   #14203a;
      --border:      #182030;
      --border-mid:  #1e2d45;

      --cyan:        #00c8f0;
      --cyan-bright: #40e0ff;
      --cyan-dim:    rgba(0, 200, 240, 0.10);
      --cyan-glow:   0 0 14px rgba(0, 200, 240, 0.45), 0 0 32px rgba(0, 200, 240, 0.12);

      --green:       #00e87a;
      --green-dim:   rgba(0, 232, 122, 0.10);
      --green-glow:  0 0 10px rgba(0, 232, 122, 0.5);

      --amber:       #ffb340;
      --amber-dim:   rgba(255, 179, 64, 0.10);
      --amber-glow:  0 0 10px rgba(255, 179, 64, 0.5);

      --red:         #ff4060;
      --red-dim:     rgba(255, 64, 96, 0.10);
      --red-glow:    0 0 10px rgba(255, 64, 96, 0.5);

      --text:        #dde8f8;
      --text-mid:    #6a88aa;
      --text-dim:    #2e4060;

      --sidebar-w:   210px;
      --header-h:    50px;

      --font-ui:     'Open Sans', sans-serif;
      --font-mono:   'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    /* Dot-grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0, 200, 240, 0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow blobs */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 700px 500px at 10% 5%,  rgba(0, 200, 240, 0.04) 0%, transparent 65%),
        radial-gradient(ellipse 500px 700px at 90% 90%, rgba(0, 232, 122, 0.03) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ───── Header ───── */
    .header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border-mid);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
      flex-shrink: 0;
      position: relative;
    }

    /* Cyan accent line under header */
    .header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--cyan) 35%, var(--green) 65%, transparent 100%);
      opacity: 0.25;
    }

    .logo-diamond {
      width: 26px;
      height: 26px;
      background: var(--cyan-dim);
      border: 1.5px solid var(--cyan);
      transform: rotate(45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--cyan-glow);
      flex-shrink: 0;
    }
    .logo-diamond span {
      transform: rotate(-45deg);
      font-size: 8px;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: -0.03em;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header-sep {
      width: 1px;
      height: 18px;
      background: var(--border-mid);
    }

    .logo-sub {
      font-size: 10px;
      font-weight: 300;
      color: var(--text-mid);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* Status bar */
    .status-bar {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 11px;
    }
    .status-ticker {
      color: var(--cyan);
      font-weight: 600;
      letter-spacing: 0.1em;
    }
    .status-complete-label {
      color: var(--green);
      font-weight: 600;
    }
    .status-sep { color: var(--text-dim); }
    .status-count {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-mid);
    }
    .sdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .sdot.pending  { background: var(--text-dim); }
    .sdot.running  { background: var(--amber); box-shadow: 0 0 5px var(--amber); }
    .sdot.complete { background: var(--green);  box-shadow: 0 0 5px var(--green); }
    .sdot.failed   { background: var(--red);    box-shadow: 0 0 5px var(--red); }

    /* ───── Body ───── */
    .body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ───── Sidebar ───── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border-mid);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-heading {
      padding: 13px 14px 10px;
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .sidebar-scroll::-webkit-scrollbar { width: 3px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

    .report-row {
      display: flex;
      align-items: center;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 0;
    }
    .report-row:hover { background: var(--surface-3); }
    .report-row:hover .report-sym { color: var(--cyan); }
    .report-row:hover .report-arrow { opacity: 1; color: var(--cyan); }

    .report-sym {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.06em;
      width: 52px;
      transition: color 0.15s;
    }
    .report-date {
      font-size: 10px;
      color: var(--text-mid);
      letter-spacing: 0.04em;
      flex: 1;
    }
    .report-arrow {
      font-size: 11px;
      color: var(--text-dim);
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    /* ───── Main ───── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* Control bar */
    .control-bar {
      padding: 11px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-label {
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .ticker-input {
      background: var(--bg);
      border: 1px solid var(--border-mid);
      color: var(--cyan);
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 7px 13px;
      width: 108px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .ticker-input:focus {
      border-color: var(--cyan);
      box-shadow: var(--cyan-glow), inset 0 0 30px rgba(0, 200, 240, 0.02);
    }
    .ticker-input::placeholder { color: var(--text-dim); }
    .ticker-input:disabled { opacity: 0.5; cursor: not-allowed; }

    .run-btn {
      position: relative;
      overflow: hidden;
      background: transparent;
      border: 1.5px solid var(--cyan);
      color: var(--cyan);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 7px 20px;
      cursor: pointer;
      transition: color 0.2s, box-shadow 0.2s;
    }
    .run-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--cyan);
      transform: translateX(-102%);
      transition: transform 0.22s ease;
    }
    .run-btn:not(:disabled):hover { color: #07090f; box-shadow: var(--cyan-glow); }
    .run-btn:not(:disabled):hover::before { transform: translateX(0); }
    .run-btn span { position: relative; }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .run-btn.active {
      border-color: var(--amber);
      color: var(--amber);
    }
    .run-btn.active::before { display: none; }

    .demo-btn {
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .demo-btn:hover { border-color: var(--text-mid); color: var(--text); }
    .demo-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Progress bar */
    .progress-strip {
      height: 36px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .progress-label {
      font-size: 8.5px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
      width: 68px;
      flex-shrink: 0;
    }
    .progress-track {
      flex: 1;
      height: 2px;
      background: var(--surface-3);
      position: relative;
      overflow: visible;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan) 0%, var(--green) 100%);
      box-shadow: 0 0 8px var(--cyan);
      transition: width 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -3px;
      top: -3px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 8px var(--cyan), 0 0 16px var(--cyan-bright);
    }
    .progress-pct {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--cyan);
      width: 38px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Content area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

    /* Section labels */
    .sec-label {
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }
    .sec-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Task grid */
    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
      gap: 5px;
    }

    .task-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }
    .task-pill.complete {
      background: var(--green-dim);
      border-color: rgba(0, 232, 122, 0.22);
    }
    .task-pill.running {
      background: var(--amber-dim);
      border-color: rgba(255, 179, 64, 0.28);
    }
    .task-pill.failed {
      background: var(--red-dim);
      border-color: rgba(255, 64, 96, 0.28);
    }
    .task-pill.pending { opacity: 0.45; }

    /* Shimmer on running */
    .task-pill.running::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 179, 64, 0.06) 50%, transparent 100%);
      animation: shimmer 1.8s linear infinite;
    }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(200%); } }

    .tdot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .task-pill.pending  .tdot { background: var(--text-dim); }
    .task-pill.running  .tdot { background: var(--amber); box-shadow: var(--amber-glow); animation: pulse 1.1s ease-in-out infinite; }
    .task-pill.complete .tdot { background: var(--green); box-shadow: var(--green-glow); }
    .task-pill.failed   .tdot { background: var(--red);   box-shadow: var(--red-glow); }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.45; transform:scale(0.65); } }

    .tname {
      font-family: var(--font-mono);
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-mid);
      transition: color 0.3s;
      position: relative;
    }
    .task-pill.pending  .tname { color: var(--text-dim); }
    .task-pill.running  .tname { color: var(--amber); }
    .task-pill.complete .tname { color: var(--green); }
    .task-pill.failed   .tname { color: var(--red); }

    /* Log output */
    .log-wrap {
      flex: 1;
      min-height: 180px;
    }

    .log-output {
      height: 100%;
      min-height: 180px;
      max-height: 340px;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 12px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.75;
      color: var(--text-mid);
      overflow-y: auto;
    }
    .log-output::-webkit-scrollbar { width: 3px; }
    .log-output::-webkit-scrollbar-track { background: transparent; }
    .log-output::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

    .log-line { display: block; }
    .lt  { color: var(--cyan); font-weight: 500; }
    .lok { color: var(--green); }
    .lwn { color: var(--amber); }
    .ler { color: var(--red); }
    .ldm { color: var(--text-dim); }
    .cursor { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>

<body>
<div id="app" x-data="sra4()" x-init="init()">

  <!-- ───── Header ───── -->
  <header class="header">
    <div class="logo-diamond"><span>S4</span></div>
    <span class="logo-text">SRA4</span>
    <div class="header-sep"></div>
    <span class="logo-sub">Stock Research Agent</span>

    <div class="status-bar" x-show="running || completed" x-cloak>
      <template x-if="running">
        <span class="status-ticker" x-text="ticker"></span>
      </template>
      <template x-if="completed">
        <span class="status-complete-label" x-text="ticker + ' — Complete'"></span>
      </template>
      <template x-if="running">
        <span class="status-sep">&mdash;</span>
      </template>
      <template x-if="running">
        <div class="status-count">
          <div class="sdot pending"></div>
          <span x-text="counts.pending"></span>
        </div>
      </template>
      <template x-if="running">
        <div class="status-count" style="color:var(--amber)">
          <div class="sdot running"></div>
          <span x-text="counts.running"></span>
        </div>
      </template>
      <template x-if="running">
        <div class="status-count" style="color:var(--green)">
          <div class="sdot complete"></div>
          <span x-text="counts.complete"></span>
        </div>
      </template>
      <template x-if="running">
        <div class="status-count" style="color:var(--red)">
          <div class="sdot failed"></div>
          <span x-text="counts.failed"></span>
        </div>
      </template>
    </div>
  </header>

  <!-- ───── Body ───── -->
  <div class="body">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-heading">Past Reports</div>
      <div class="sidebar-scroll">
        <template x-for="r in reports" :key="r.id">
          <div class="report-row" @click="openReport(r)">
            <span class="report-sym" x-text="r.sym"></span>
            <span class="report-date" x-text="r.date"></span>
            <span class="report-arrow">↗</span>
          </div>
        </template>
      </div>
    </aside>

    <!-- Main panel -->
    <div class="main">

      <!-- Control bar -->
      <div class="control-bar">
        <span class="input-label">Ticker</span>
        <input class="ticker-input"
          type="text"
          placeholder="AAPL"
          x-model="tickerInput"
          @keyup.enter="launch"
          :disabled="running">
        <button class="run-btn" :class="{ active: running }" @click="launch" :disabled="running">
          <span x-text="running ? '● Running' : '▶ Run'"></span>
        </button>
        <button class="demo-btn" @click="tickerInput='ADSK'; launch()" :disabled="running" x-show="!running">
          Demo
        </button>
      </div>

      <!-- Progress bar -->
      <div class="progress-strip" x-show="running || completed" x-cloak>
        <span class="progress-label" x-text="completed ? 'Complete' : 'Progress'"></span>
        <div class="progress-track">
          <div class="progress-fill" :style="`width:${pct}%`"></div>
        </div>
        <span class="progress-pct" x-text="pct + '%'"></span>
      </div>

      <!-- Content -->
      <div class="content">

        <!-- Task grid -->
        <div>
          <div class="sec-label">Tasks</div>
          <div class="task-grid">
            <template x-for="t in tasks" :key="t.id">
              <div class="task-pill" :class="t.state">
                <div class="tdot"></div>
                <span class="tname" x-text="t.id"></span>
              </div>
            </template>
          </div>
        </div>

        <!-- Log -->
        <div class="log-wrap">
          <div class="sec-label">Output</div>
          <div class="log-output" id="logbox">
            <template x-for="(ln, i) in logs" :key="i">
              <span class="log-line" x-html="ln"></span>
            </template>
            <span class="cursor" x-show="running">_</span>
          </div>
        </div>

      </div><!-- /content -->
    </div><!-- /main -->
  </div><!-- /body -->

</div><!-- /app -->

<script>
function sra4() {
  return {
    tickerInput: '',
    ticker: '',
    running: false,
    completed: false,
    pct: 0,
    tasks: [],
    logs: [],
    reports: [],
    ws: null,
    pollTimer: null,

    async init() {
      await this.loadReports();
    },

    async loadReports() {
      try {
        const resp = await fetch('/reports');
        this.reports = await resp.json();
      } catch (e) {
        console.error('Failed to load reports', e);
      }
    },

    log(html) {
      this.logs.push(html);
      this.$nextTick(() => {
        const el = document.getElementById('logbox');
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    flashError() {
      const el = document.querySelector('.ticker-input');
      if (!el) return;
      el.style.borderColor = 'var(--red)';
      el.style.boxShadow = '0 0 10px rgba(255,64,96,0.4)';
      setTimeout(() => {
        el.style.borderColor = '';
        el.style.boxShadow = '';
      }, 800);
    },

    async launch() {
      const sym = this.tickerInput.trim().toUpperCase();
      if (!sym) { this.flashError(); return; }
      if (this.running) return;

      this.ticker = sym;
      this.running = true;
      this.completed = false;
      this.pct = 0;
      this.logs = [];
      this.tasks = [];

      let run_id;
      try {
        const resp = await fetch('/run', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ticker: sym}),
        });
        if (resp.status === 409) {
          this.log('<span class="lwn">⚠ Already running — wait for current run to complete</span>');
          this.running = false;
          return;
        }
        if (!resp.ok) {
          this.log(`<span class="ler">✗ Error starting run: ${resp.status}</span>`);
          this.running = false;
          return;
        }
        const data = await resp.json();
        run_id = data.run_id;
      } catch (e) {
        this.log(`<span class="ler">✗ Network error: ${e.message}</span>`);
        this.running = false;
        return;
      }

      this.connectWS(run_id);
      this.startPoll(run_id);
    },

    connectWS(run_id, retry = false) {
      if (retry) {
        this.log('<span class="lwn">⚠ Reconnecting log stream...</span>');
      }
      const ws = new WebSocket(`ws://${location.host}/ws/${run_id}`);
      this.ws = ws;

      ws.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'log') {
          const task = msg.task.replace(/</g, '&lt;');
          const text = msg.text.replace(/\n/g, '<br>');
          this.log(`<span class="lt">[${task}]</span> ${text}`);
        } else if (msg.type === 'complete') {
          this.stopPoll();
          this.running = false;
          this.completed = true;
          this.pct = 100;
          this.log(msg.success
            ? '<span class="lok">✓ Research complete · Opening in Typora</span>'
            : '<span class="ler">✗ Research failed — check logs</span>'
          );
          this.loadReports();
        } else if (msg.type === 'error') {
          this.log(`<span class="ler">✗ ${msg.text}</span>`);
          this.stopPoll();
          this.running = false;
        }
      };

      ws.onerror = () => {
        if (this.running) {
          setTimeout(() => this.connectWS(run_id, true), 1000);
        }
      };

      ws.onclose = () => {
        if (this.running) {
          setTimeout(() => this.connectWS(run_id, true), 1000);
        }
      };
    },

    startPoll(run_id) {
      this.pollTimer = setInterval(async () => {
        try {
          const resp = await fetch(`/status/${run_id}`);
          if (!resp.ok) return;
          const data = await resp.json();
          if (data.tasks) {
            this.tasks = data.tasks.map(t => ({
              id: t.task_id,
              state: t.status === 'complete' ? 'complete'
                   : t.status === 'running'  ? 'running'
                   : t.status === 'failed'   ? 'failed'
                   : 'pending',
            }));
            const total = this.tasks.length;
            const done  = this.tasks.filter(t => t.state === 'complete').length;
            if (total > 0) this.pct = Math.min(99, Math.round((done / total) * 100));
          }
        } catch (e) {
          // swallow transient poll errors
        }
      }, 2000);
    },

    stopPoll() {
      if (this.pollTimer) {
        clearInterval(this.pollTimer);
        this.pollTimer = null;
      }
    },

    openReport(r) {
      fetch(`/open/${r.run_id}`, {method: 'POST'}).catch(() => {});
    },

    get counts() {
      return {
        pending:  this.tasks.filter(t => t.state === 'pending').length,
        running:  this.tasks.filter(t => t.state === 'running').length,
        complete: this.tasks.filter(t => t.state === 'complete').length,
        failed:   this.tasks.filter(t => t.state === 'failed').length,
      };
    },
  };
}
</script>
