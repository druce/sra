  write_profile:
    sort_order: 30
    description: "Write Section 1: Company Profile"
    type: claude
    depends_on: [append_index]
    config:
      max_budget_usd: 1.50
      system: |
        You are a senior equity research analyst writing a professional report on ${company_name} (${symbol}).
        Read and follow the style guide at ../../STYLE.md.
      disallowed_tools: [WebSearch, WebFetch, Agent, Skill, yfinance, alphavantage, brave-search, wikipedia, openbb-mcp, playwright, fetch, filesystem]
      artifacts_inline:
        - artifacts/manifest.json
        - artifacts/profile.json
        - artifacts/peers_list.json
        - artifacts/key_ratios.csv
        - artifacts/income_statement.csv
        - artifacts/balance_sheet.csv
        - artifacts/cash_flow.csv
        - artifacts/analyst_recommendations.json
        - artifacts/technical_analysis.json
        - artifacts/8k_summary.json
      prompt: |
        Your task is to use the gathered source material to write an extended narrative
        company profile, including founding story, company history with key milestones
        and a business overview with recent developments.

        1. Gather material already discovered for this section:
          Run: uv run python skills/search_index/search_index.py --all --workdir ${workdir} --sections profile
          Read artifacts/manifest.json for a description of all available artifacts and review relevant artifacts.
          Read the inline artifacts below.

        These are all chunks relevant to this section — data artifacts, research findings, and MCP responses.
        Use these results as your primary source alongside the inline structured data above.
        Use Read and Grep tools to access larger artifact files not included inline.
        Do not call other external tools or APIs — focus on synthesis from provided data.
        Do not attempt external research — synthesize from the provided data only.

        **Source triangulation**: When citing numbers or key claims:
        - If confirmed by 2+ independent sources (e.g., SEC filing AND analyst report): state with confidence
        - If from a single source only: qualify with source attribution (e.g., "per the 10-K filing...")
        - If sources conflict: acknowledge the discrepancy and explain which you weight more heavily,
          per the Source Reliability Hierarchy in STYLE.md

        Structure the profile as follows:
        1 paragraph executive summary covering: what the company does, its scale (revenue, market cap,
        employees, geographic footprint), and what makes it an interesting from an investment perspective.

        ## History and Key Milestones
        1-3 paragraph narrative origin story: founding circumstances, founders, early vision. Then walk through the
        critical inflection points — pivots, product launches, IPO, major acquisitions, near-death
        experiences, and transformative moments — that explain how the company became what it is
        today. Emphasize events that shaped the current competitive position or business model.
        Include approximate dates.

        ## Core Business and Investment Highlights
          Cover in 1-3 paragraphs:
          - Revenue segments with approximate size and growth trajectory
          - Primary products/services and what differentiates them
          - Business model (how the company actually makes money)
          - Sources of competitive advantage (network effects, switching costs, IP, scale, distribution)
          - Key metrics investors track (unit economics, margins, retention, utilization, etc.)
          - The central tension or debate in the investment case (e.g., "priced as X, may become Y")

        ## Recent Developments
          Cover in 1 paragraph the most significant developments from the past 12 months that materially
          affect the investment case, such as: financial results, product launches, competitive moves,
          regulatory events, management changes, and any macro/policy tailwinds or headwinds.
          Be specific — include figures, dates, and context for why each development matters.
          Use a straightforward, factual tone throughout the analysis. Focus on data and observable facts rather than speculation.

        Begin the section with a top-level heading in this exact format: ## 1. Company Profile
        Use ## for subsection headings within.

        Save results in markdown format to drafts/section_1_profile.md

        ${artifact_context_inline}

      hard_checks:
        - "startswith: ## 1. Company Profile"
        # - "min_length: x"
        # - "max_length: x"
        # - "startswith: TEXT"
        # - "contains: TEXT"
        # - "regex: PATTERN"
      hard_check_retries: 2
      n_iterations: 1
      critic_prompt: |
        Read the draft section at ${draft_path} carefully and critique it for an equity research report.

        ## Evidence-grounded fact-checking

        For every factual claim in the draft (numbers, dates, percentages, rankings, named entities),
        perform explicit citation verification:

          1. Retrieve the indexed source material for this section:
            Run: uv run python skills/search_index/search_index.py --all --workdir ${workdir} --sections profile
          2. Read relevant structured artifacts in artifacts/ (JSON, CSV) for specific numbers.
          3. For each factual claim in the draft, output a verification entry:
            - **Claim**: Quote the specific claim from the draft
            - **Source**: Cite the source chunk ID or artifact file and the relevant text
            - **Verdict**: CONFIRMED / CONTRADICTED / UNSUPPORTED
            - **Detail**: If CONTRADICTED, state what the source actually says.
              If UNSUPPORTED, suggest search queries that might find evidence.

        ## Quality evaluation

        Also evaluate for:
        - Clarity and readability
        - Missing or incomplete analysis — topics covered in the source material but absent from the draft
        - Unsupported claims or speculation not grounded in sources
        - Repetition
        - Professional tone and formatting
        - Compliance with the style guide at ../../STYLE.md

        Write a numbered list of specific issues, ordered by importance.
        For each issue: state what's wrong, cite the source data where applicable, and suggest the fix.

        Save your critique to ${critique_path}.
      rewrite_prompt: |
        Read the current draft at ${draft_path} and the critique at ${critique_path}.

        Address each issue identified in the critique. For factual corrections,
        look up the correct values:
          Run: uv run python skills/search_index/search_index.py --all --workdir ${workdir} --sections profile
        Also read relevant structured artifacts in artifacts/ (JSON, CSV) to verify numbers.

        - Fix factual inaccuracies — replace incorrect figures with source-verified values
        - Elaborate on incomplete analysis using indexed source material
        - Remove or substantiate unsupported claims — if no source supports it, cut it
        - Remove repetition
        - Improve clarity and readability
        - Ensure professional tone
        - Follow the style guide at ../../STYLE.md

        Do not introduce new research or speculation. Every factual claim in the
        revised draft must be traceable to the indexed sources or structured artifacts.

        Save the revised section to ${rewrite_path}.
      critic_model: claude-sonnet-4-6
      rewrite_model: claude-sonnet-4-6
      critic_disallowed_tools: [WebSearch, WebFetch, Agent, Skill, yfinance, alphavantage, brave-search, wikipedia, openbb-mcp, playwright, fetch, filesystem]
      rewrite_disallowed_tools: [WebSearch, WebFetch, Agent, Skill, yfinance, alphavantage, brave-search, wikipedia, openbb-mcp, playwright, fetch, filesystem]
    outputs:
      section: {path: "artifacts/section_1_profile.md", format: md, description: "Section 1: Company profile covering company history, core business, competitors, and recent news"}

