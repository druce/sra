dag:
  version: 2
  name: Equity Research Report Bot
  vars:
    artifact_context: |
      Information gathered so far is in the artifacts/ subdirectory.
      Read artifacts/manifest.json for a description of all available files.
    artifact_context_inline: |
      Key artifacts are included inline below.
      Additional files are in artifacts/ — use Read tool for larger files not included inline.
    research_output_instructions: |
      Write all your findings to a single markdown document.
      Structure it with clear ## headings for major topics.
      Separate distinct findings with --- horizontal rules.
      Cite sources inline: (Source: Wikipedia), (Source: 10-K Item 1A), (Source: FMP company-profile), etc.
      Include specific data points: numbers, dates, percentages, dollar amounts.
      Each finding should be a self-contained paragraph that makes sense without surrounding context
      (the document will be split into chunks for a search index).
  inputs:
    ticker: "${ticker}"
    workdir: "${workdir}"
  root_dir: .
  template_dir: templates
  drafts_dir: drafts
  data_dir: data # not implemented, in future write reports based on user-provided data
  allowed_tools: all # not implemented, all allowed, in future limit tools

tasks:
  # --- Data gathering tasks ---
  profile:
    sort_order: 1
    description: Get company profile data based on symbol
    type: python
    config:
      script: skills/fetch_profile/fetch_profile.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      profile:    {path: "artifacts/profile.json", format: json, description: "Company identity (name, sector, industry, country, employees), valuation snapshot (market cap, price, 52-week range, beta, shares outstanding)"}
    sets_vars:
      symbol:       {artifact: "artifacts/profile.json", key: "symbol"}
      company_name: {artifact: "artifacts/profile.json", key: "company_name"}

  peers:
    sort_order: 2
    description: Get company peers data based on symbol
    type: python
    config:
      script: skills/identify_peers/identify_peers.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      peers_list: {path: "artifacts/peers_list.json", format: json, description: "Peer companies with symbol, name, price, and market cap; includes provider source and Claude-filtered flag"}

  technical:
    sort_order: 3
    description: Generate stock chart and technical indicators
    type: python
    depends_on: [profile, peers]
    config:
      script: skills/fetch_technical/fetch_technical.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      chart:              {path: "artifacts/chart.png", format: png, description: "1-year stock price chart with SMA-50, SMA-200, volume bars, RSI subplot, and MACD subplot"}
      technical_analysis: {path: "artifacts/technical_analysis.json", format: json, description: "Technical indicators: SMA, EMA, RSI, MACD, Bollinger Bands, ATR, OBV, support/resistance levels, and trend signals"}

  fundamental:
    sort_order: 4
    description: Fetch financial statements, ratios, and analyst data
    type: python
    depends_on: [profile, peers]
    config:
      script: skills/fetch_fundamental/fetch_fundamental.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
        peers_file: "artifacts/peers_list.json"
    outputs:
      income_statement:        {path: "artifacts/income_statement.csv", format: csv, description: "Annual income statement: revenue, COGS, gross profit, operating income, net income, EPS, shares outstanding"}
      balance_sheet:           {path: "artifacts/balance_sheet.csv", format: csv, description: "Annual balance sheet: total assets, liabilities, equity, cash, debt, working capital, book value per share"}
      cash_flow:               {path: "artifacts/cash_flow.csv", format: csv, description: "Annual cash flow statement: operating, investing, financing cash flows, CapEx, free cash flow"}
      key_ratios:              {path: "artifacts/key_ratios.csv", format: csv, description: "Financial ratios for company and peers: P/E, P/B, P/S, EV/EBITDA, ROE, ROA, debt/equity, margins"}
      analyst_recommendations: {path: "artifacts/analyst_recommendations.json", format: json, description: "Wall Street analyst consensus: buy/hold/sell counts, price targets (low/mean/median/high), recent rating changes"}

  detailed_profile:
    sort_order: 5
    description: Research news, business profile, and executives via Claude
    type: python
    depends_on: [profile, peers]
    config:
      script: skills/fetch_detailed_profile_info/fetch_detailed_profile_info.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      news_stories:       {path: "knowledge/news_stories.md", format: md, description: "Recent news stories and developments"}
      business_profile:   {path: "knowledge/business_profile.md", format: md, description: "Narrative business overview: history, products, markets, strategy, and competitive positioning"}
      executive_profiles: {path: "knowledge/executive_profiles.md", format: md, description: "Key executive bios: name, title, background, tenure, and notable achievements"}
      risk:               {path: "knowledge/risk_analysis.md", format: md, description: "Risk analysis: regulatory, operational, market, financial, and strategic risks"}
      investment_thesis:  {path: "knowledge/investment_thesis.md", format: md, description: "Investment thesis: investment rationale, catalysts, bull/bear cases, and valuation"}
      competitive:        {path: "knowledge/competitive_analysis.md", format: md, description: "Competitive landscape: positioning, market share, key competitors, and differentiation"}
      business_model:     {path: "knowledge/business_model_analysis.md", format: md, description: "Business model analysis: revenue streams, cost structure, unit economics, scalability, profitability, and moat / defensibility"}

  # perplexity:
  #   sort_order: 5
  #   description: Research news, business profile, and executives via Perplexity AI
  #   type: python
  #   depends_on: [profile, peers]
  #   config:
  #     script: skills/fetch_perplexity/fetch_perplexity.py
  #     args:
  #       ticker: "${ticker}"
  #       workdir: "${workdir}"
  #   outputs:
  #     news_stories:       {path: "artifacts/news_stories.md", format: md, description: "Recent news stories and developments sourced via Perplexity AI with citations"}
  #     business_profile:   {path: "artifacts/business_profile.md", format: md, description: "Narrative business overview: history, products, markets, strategy, and competitive positioning via Perplexity AI"}
  #     executive_profiles: {path: "artifacts/executive_profiles.md", format: md, description: "Key executive bios: name, title, background, tenure, and notable achievements via Perplexity AI"}

  fetch_edgar:
    sort_order: 6
    description: Fetch SEC filings (10-K, 10-Q, 8-K) via edgartools
    type: python
    depends_on: [profile, peers]
    config:
      script: skills/fetch_edgar/fetch_edgar.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      filings_index: {path: "artifacts/filings_index.json", format: json, description: "Index of all fetched SEC filings with filing type, date, accession number, and local file paths"}
      10k_items:     {path: "knowledge/", format: md, description: "Extracted 10-K annual report sections: business overview, risk factors, MD&A, financial statements, and notes"}
      10q_items:     {path: "knowledge/", format: md, description: "Extracted 10-Q quarterly report sections: MD&A, financial statements, and risk factor updates"}
      financials:    {path: "artifacts/", format: csv, description: "SEC-sourced financial data tables extracted from XBRL filings"}
      8k_summary:    {path: "artifacts/8k_summary.json", format: json, description: "Recent 8-K current report summaries: material events, management changes, financial results announcements"}

  wikipedia:
    sort_order: 7
    description: Fetch Wikipedia company summary
    type: python
    depends_on: [profile, peers]
    config:
      script: skills/fetch_wikipedia/fetch_wikipedia.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      wikipedia_summary: {path: "knowledge/wikipedia_summary.txt", format: txt, description: "Wikipedia article summary providing company history, operations, and public background"}
      wikipedia_full:    {path: "knowledge/wikipedia_full.txt", format: txt, description: "Full Wikipedia article text with complete detail on company history, operations, and background"}

  custom_research:
    sort_order: 8
    description: Run user-provided custom investigation prompts via Claude
    type: python
    depends_on: [profile, peers]
    config:
      script: skills/custom_research/custom_research.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      custom_research_tags: {path: "artifacts/custom_research_tags.json", format: json, description: "Section relevance tags for each custom research response"}

  # perplexity_analysis:
  #   sort_order: 8
  #   description: Generate business model, competitive, risk, and investment analysis via Perplexity
  #   type: python
  #   depends_on: [profile, peers]
  #   config:
  #     script: skills/fetch_perplexity_analysis/fetch_perplexity_analysis.py
  #     args:
  #       ticker: "${ticker}"
  #       workdir: "${workdir}"
  #   outputs:
  #     business_model: {path: "artifacts/business_model_analysis.md", format: md, description: "Business model deep-dive: revenue streams, unit economics, scalability, and moat analysis via Perplexity AI"}
  #     competitive:    {path: "artifacts/competitive_analysis.md", format: md, description: "Competitive landscape: market share, key rivals, differentiation, and positioning analysis via Perplexity AI"}
  #     risk:           {path: "artifacts/risk_analysis.md", format: md, description: "Risk factor analysis: regulatory, market, operational, financial, and strategic risks via Perplexity AI"}
  #     investment:     {path: "artifacts/investment_thesis.md", format: md, description: "Investment thesis: bull/bear cases, catalysts, valuation considerations, and recommendation framework via Perplexity AI"}

  # --- Chunk, tag, and index wave ---
  # chunk docs and embed chunks in chunks.json
  chunk_documents:
    sort_order: 10
    description: Chunk and embed text artifacts for hybrid retrieval
    type: python
    depends_on: [technical, fundamental, detailed_profile, fetch_edgar, wikipedia, custom_research]
    config:
      script: skills/chunk_index/chunk_documents.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      chunks: {path: "lancedb/chunks.json", format: json, description: "Text chunks with embeddings from all text artifacts"}

  # tag chunks with tags in chunk_tags.json
  tag_chunks:
    sort_order: 11
    description: Assign section relevance tags to each chunk using AI
    type: claude
    depends_on: [chunk_documents]
    config:
      model: claude-haiku-4-5
      prompt: |
        ${artifact_context}

        Read lancedb/chunks.json. For each chunk, assign relevance tags from this list:
        profile, business_model, competitive, supply_chain, financial, valuation, risk_news

        A chunk may have multiple tags if it is relevant to multiple sections.
        Apply tags generously — it is better to over-tag than under-tag.

        Write a JSON file to lancedb/chunk_tags.json in this exact format:
        [{"id": "<chunk_id>", "tags": ["tag1", "tag2"]}, ...]

        Include every chunk from chunks.json. Do not skip any.
      disallowed_tools: [WebSearch, WebFetch, yfinance, alphavantage, brave-search, wikipedia, openbb-mcp, playwright]
    outputs:
      chunk_tags: {path: "lancedb/chunk_tags.json", format: json, description: "Section relevance tags for each chunk"}

  # build LanceDB index from chunks and tags
  build_index:
    sort_order: 12
    description: Build LanceDB hybrid vector+BM25 index from chunks and tags
    type: python
    depends_on: [tag_chunks]
    config:
      script: skills/chunk_index/build_index.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      index: {path: "lancedb/index/", format: lancedb, description: "LanceDB hybrid search index of all chunked artifacts"}

  # --- Research agent tasks (Claude subagents with MCP tools, run in parallel) ---
  research_profile:
    sort_order: 20
    description: Research company profile, history, and management
    type: claude
    depends_on: [build_index]
    config:
      model: claude-sonnet-4-6
      max_budget_usd: 2.00
      mcp_config: [mcp-research.json]
      prompt: |
        You are an investigative business journalist specializing in corporate histories
        and leadership profiles. You focus on the narrative arc of companies — founding
        stories, pivotal decisions, leadership transitions, and the cultural DNA that
        shapes strategy. You investigate ${company_name} (${symbol}).

        Your task is to gather and organize the raw material needed to write
        an extended narrative company profile, including founding story, company
        history with key milestones and a business overview with recent developments.

        ${artifact_context}

        Ensure you have all key facts for a profile:
        - Founding date and founder(s)
        - Major historical milestones, mergers, acquisitions, and pivots
        - Current products and services, geographical and customer segments.
        - Business model and revenue streams
        - Financial metrics
        - Recent company news

        **Step 0: Decompose your research brief into specific questions.**
        Before searching, break this topic into 5-10 specific questions you need to answer.
        For each question, formulate 2-3 search queries using different terminology
        (synonyms, related concepts). For example, "founding story" might also be searched
        as "company history origin", "when was {company} founded", "founder background".
        This ensures comprehensive retrieval from the index.

        1. Retrieve everything already discovered for this section:
          Run: uv run python skills/search_index/search_index.py --all --workdir ${workdir} --sections profile
          Read artifacts/manifest.json for a description of all available artifacts and review relevant artifacts.
          Review these results carefully — this is what we already have from SEC filings, Wikipedia, and other ingested sources.

        2. Identify gaps in the existing material, then use MCP tools to fill them (company profile, executives, news, etc.).

        3. Read relevant structured artifacts in artifacts/ (JSON, CSV files) for specific data points.

        4. **Evaluate information sufficiency.** Review your findings against the research brief.
          List any gaps — questions you cannot yet answer with evidence. For each gap:
          - Run additional search_index.py queries with different search terms
          - Try alternative MCP tool calls with different parameters
          Repeat until all brief questions are addressed or you've exhausted available
          sources (max 2 additional search rounds).

        ${research_output_instructions}

        Save your findings to knowledge/findings_profile.md
      disallowed_tools: []
    outputs:
      findings: {path: "knowledge/findings_profile.md", format: md, description: "Research findings on company profile, history, and management"}

  research_business:
    sort_order: 21
    description: Research business model, revenue streams, and competitive moat
    type: claude
    depends_on: [build_index]
    config:
      model: claude-sonnet-4-6
      max_budget_usd: 2.00
      mcp_config: [mcp-research.json]
      prompt: |
        You are a management consultant specializing in business model analysis and
        unit economics. You evaluate how companies create, deliver, and capture value —
        revenue architecture, cost structures, pricing power, and scalability.
        You investigate ${company_name} (${symbol}).

        Your task is to gather and organize the raw material needed to write
        a business model analysis, including revenue streams, segment breakdown,
        competitive moat, and growth drivers.

        ${artifact_context}

        Ensure you have all key facts for an analysis of the company's business model:
        - Segment revenue breakdown (revenue by segment, $ and %)
        - Geographic revenue breakdown ($ and %)
        - Addressable market by geography and segment, headroom for growth
        - YoY growth rates for each segment and geography
        - Named products and services, which segment they belong to, launch date if recent, and any disclosed pricing or subscription terms
        - Any products discontinued or pivoted in the last 12 months; upcoming product pipeline
        - Sales/distribution model (direct, dealer, online, channel partners)
        - Revenue types (e.g., hardware sale, subscription, licensing, regulatory credits, services fees)
        - Customer concentration (>10% customers)
        - Disclosed seasonality language from the 10-K MD&A
        - Margins by segment
        - Expenses like R&D, SG&A, COGS, attributable to segments or overhead
        - Capital expenditures
        - Growth drivers, product pipeline, and forward guidance as to changes
        - Key ratios and peer comparisons
        - Key moats and competitive advantages
        - Capital return strategies, M&A opportunities.

        **Step 0: Decompose your research brief into specific questions.**
        Before searching, break this topic into 5-10 specific questions you need to answer.
        For each question, formulate 2-3 search queries using different terminology.
        For example, "revenue breakdown" might also be searched as "segment performance",
        "business unit revenue", "product line sales". This ensures comprehensive
        retrieval from the index.

        1. Retrieve everything already discovered for this section:
          Run: uv run python skills/search_index/search_index.py --all --workdir ${workdir} --sections business_model
          Read artifacts/manifest.json for a description of all available artifacts and review relevant artifacts.
          Review these results carefully — this is what we already have from SEC filings, Wikipedia, and other ingested sources.

        2. Identify gaps in the existing material, then use MCP tools to research revenue breakdown, segment trends, and moat sources.
          Use searches like "{COMPANY} new product launch {CURRENT_YEAR}" to ensure knowledge is complete.

        3. Read relevant structured artifacts in artifacts/ (JSON, CSV files) for specific data points.

        4. **Evaluate information sufficiency.** Review your findings against the research brief.
          List any gaps — questions you cannot yet answer with evidence. For each gap:
          - Run additional search_index.py queries with different search terms
          - Try alternative MCP tool calls with different parameters
          Repeat until all brief questions are addressed or you've exhausted available
          sources (max 2 additional search rounds).

        ${research_output_instructions}

        Save your findings to knowledge/findings_business_model.md
      disallowed_tools: []
    outputs:
      findings: {path: "knowledge/findings_business_model.md", format: md, description: "Research findings on business model, revenue streams, and competitive moat"}

  research_competitive:
    sort_order: 22
    description: Research competitive landscape, market share, and industry dynamics
    type: claude
    depends_on: [build_index]
    config:
      model: claude-sonnet-4-6
      max_budget_usd: 2.00
      mcp_config: [mcp-research.json]
      prompt: |
        You are a strategy consultant with deep expertise in competitive dynamics,
        market structure, and Porter's Five Forces analysis. You evaluate industries
        through the lens of market share shifts, barriers to entry, and sustainable
        competitive advantages. You investigate ${company_name} (${symbol}).

        Your task is to gather and organize the raw material needed to write
        a competitive landscape analysis, including market share, industry dynamics,
        and competitive positioning.

        ${artifact_context}

        Ensure you have all key facts for an analysis of the company's competitive environment:
        - Competitors, their value proposition and their market share
        - For significant competitors:
          - Scale: revenue, units sold, or relevant volume metric vs. the subject company
          - Specific competitive advantage or threat they pose (technology, cost, geography, product lineup etc.)
          - Differences vs. competitors in product lineup, and competitiveness in individual major products and segments.
          - Potential changes with upcoming products.
          - Any disadvantage, limitation or vulnerability relative to the subject company
        - Emerging, adjacent, and potential competitors, analyze risk for disruption
        - Trends in competitive environment, share, impact on profit margins
          - Where unit and dollar market share is being gained or lost to whom
          - Whether the losses are structural (product, brand, price) or cyclical
          - Evidence of overall increase or decrease in competition/pricing power
          - Areas of profit, investment and focus across peers


        **Step 0: Decompose your research brief into specific questions.**
        Before searching, break this topic into 5-10 specific questions you need to answer.
        For each question, formulate 2-3 search queries using different terminology.
        For example, "market share" might also be searched as "competitive position",
        "industry ranking", "revenue comparison peers". This ensures comprehensive
        retrieval from the index.

        1. Retrieve everything already discovered for this section:
          Run: uv run python skills/search_index/search_index.py --all --workdir ${workdir} --sections competitive
          Read artifacts/manifest.json for a description of all available artifacts and review relevant artifacts.
          Review these results carefully — this is what we already have from SEC filings, Wikipedia, and other ingested sources.

        2. Identify gaps in the existing material, then use MCP tools to research competitors, peer financials, and market dynamics.

        3. Read relevant structured artifacts in artifacts/ (JSON, CSV files) for specific data points.

        4. **Evaluate information sufficiency.** Review your findings against the research brief.
          List any gaps — questions you cannot yet answer with evidence. For each gap:
          - Run additional search_index.py queries with different search terms
          - Try alternative MCP tool calls with different parameters
          Repeat until all brief questions are addressed or you've exhausted available
          sources (max 2 additional search rounds).

        ${research_output_instructions}

        Save your findings to knowledge/findings_competitive.md
      disallowed_tools: []
    outputs:
      findings: {path: "knowledge/findings_competitive.md", format: md, description: "Research findings on competitive landscape, market share, and industry dynamics"}

  research_supply_chain:
    sort_order: 23
    description: Research supply chain, manufacturing dependencies, and geopolitical exposure
    type: claude
    depends_on: [build_index]
    config:
      model: claude-sonnet-4-6
      max_budget_usd: 2.00
      mcp_config: [mcp-research.json]
      prompt: |
        You are a supply chain analyst with expertise in manufacturing, logistics,
        procurement, and trade policy. You evaluate vendor dependencies, geographic
        concentration risk, inventory strategies, and the operational resilience of
        industrial value chains. You investigate ${company_name} (${symbol}).

        Your task is to gather and organize the raw material needed to write
        a supply chain analysis, including manufacturing partners, input dependencies,
        and geopolitical exposure.

        ${artifact_context}

        Ensure you have all key facts for an analysis of the company's supply chain:
        - Key suppliers and manufacturing partners
        - Input dependencies (raw materials, components, critical inputs)
        - Supplier concentration risk (single-source or limited-source dependencies)
        - Geographic exposure of supply chain (countries, regions, trade route risks)
        - Geopolitical risks (tariffs, sanctions, trade restrictions, political instability)
        - Logistics and distribution infrastructure
        - Inventory management approach and working capital implications
        - Recent supply chain disruptions or changes
        - Vertical integration vs. outsourcing decisions
        - Downstream distribution channels and customer dependencies

        **Step 0: Decompose your research brief into specific questions.**
        Before searching, break this topic into 5-10 specific questions you need to answer.
        For each question, formulate 2-3 search queries using different terminology.
        For example, "supplier concentration" might also be searched as "vendor dependency",
        "single source risk", "procurement partners". This ensures comprehensive
        retrieval from the index.

        1. Retrieve everything already discovered for this section:
          Run: uv run python skills/search_index/search_index.py --all --workdir ${workdir} --sections supply_chain
          Read artifacts/manifest.json for a description of all available artifacts and review relevant artifacts.
          Review these results carefully — this is what we already have from SEC filings, Wikipedia, and other ingested sources.

        2. Identify gaps in the existing material, then use MCP tools to research key suppliers, concentration risk, and geographic exposure.

        3. Read relevant structured artifacts in artifacts/ (JSON, CSV files) for specific data points.

        4. **Evaluate information sufficiency.** Review your findings against the research brief.
          List any gaps — questions you cannot yet answer with evidence. For each gap:
          - Run additional search_index.py queries with different search terms
          - Try alternative MCP tool calls with different parameters
          Repeat until all brief questions are addressed or you've exhausted available
          sources (max 2 additional search rounds).

        ${research_output_instructions}

        Save your findings to knowledge/findings_supply_chain.md
      disallowed_tools: []
    outputs:
      findings: {path: "knowledge/findings_supply_chain.md", format: md, description: "Research findings on supply chain, manufacturing, and geopolitical exposure"}

  research_financial:
    sort_order: 24
    description: Research financial performance, growth trends, and key metrics
    type: claude
    depends_on: [build_index]
    config:
      model: claude-sonnet-4-6
      max_budget_usd: 2.00
      mcp_config: [mcp-research.json]
      prompt: |
        You are a forensic accountant and financial analyst specializing in earnings
        quality, cash flow analysis, and balance sheet forensics. You scrutinize
        financial statements for red flags, non-recurring items, aggressive accounting,
        and operating leverage dynamics. You investigate ${company_name} (${symbol}).

        Your task is to gather and organize the raw material needed to write
        a financial analysis, including revenue growth, margins, cash flow,
        balance sheet strength, and key financial ratios.

        ${artifact_context}

        Ensure you have all key facts for an analysis of the company's financial performance:
        - Revenue trends (3-5 year history, YoY growth rates, organic vs. inorganic)
        - Margin analysis (gross, operating, net — trends and drivers of change)
        - Cash flow generation (operating, free cash flow, conversion ratio)
        - Balance sheet strength (cash, debt levels, leverage ratios, credit ratings)
        - Working capital dynamics (DSO, DIO, DPO, cash conversion cycle)
        - Key financial ratios vs. peers (ROE, ROA, ROIC, asset turnover)
        - Capital expenditure levels and trends
        - Earnings quality (accruals, one-time items, adjustments)
        - TTM and forward estimates vs. historical performance
        - Segment-level financial performance where available

        **Step 0: Decompose your research brief into specific questions.**
        Before searching, break this topic into 5-10 specific questions you need to answer.
        For each question, formulate 2-3 search queries using different terminology.
        For example, "cash flow generation" might also be searched as "free cash flow",
        "operating cash flow conversion", "capital expenditure vs depreciation".
        This ensures comprehensive retrieval from the index.

        1. Retrieve everything already discovered for this section:
          Run: uv run python skills/search_index/search_index.py --all --workdir ${workdir} --sections financial
          Read artifacts/manifest.json for a description of all available artifacts and review relevant artifacts.
          Review these results carefully — this is what we already have from SEC filings, financial data, and other ingested sources.

        2. Identify gaps in the existing material, then use MCP tools to research financial statements, TTM metrics, and trend analysis.

        3. Read relevant structured artifacts in artifacts/ (JSON, CSV files) for specific data points.

        4. **Evaluate information sufficiency.** Review your findings against the research brief.
          List any gaps — questions you cannot yet answer with evidence. For each gap:
          - Run additional search_index.py queries with different search terms
          - Try alternative MCP tool calls with different parameters
          Repeat until all brief questions are addressed or you've exhausted available
          sources (max 2 additional search rounds).

        ${research_output_instructions}

        Save your findings to knowledge/findings_financial.md
      disallowed_tools: []
    outputs:
      findings: {path: "knowledge/findings_financial.md", format: md, description: "Research findings on financial performance, growth trends, and key metrics"}

  research_valuation:
    sort_order: 25
    description: Research valuation multiples, analyst targets, and DCF inputs
    type: claude
    depends_on: [build_index]
    config:
      model: claude-sonnet-4-6
      max_budget_usd: 2.00
      mcp_config: [mcp-research.json]
      prompt: |
        You are a valuation specialist with experience in investment banking and
        equity research. You build DCF models, analyze comparable company multiples,
        and assess the gap between market pricing and intrinsic value. You are
        skilled at identifying what assumptions are priced in and where the market
        may be wrong. You investigate ${company_name} (${symbol}).

        Your task is to gather and organize the raw material needed to write
        a valuation analysis, including current multiples, historical ranges,
        analyst price targets, and DCF inputs.

        ${artifact_context}

        Ensure you have all key facts for an analysis of the company's valuation:
        - Current valuation multiples (P/E, P/S, P/B, EV/EBITDA, EV/Revenue, PEG)
        - Historical valuation ranges (3-5 year highs, lows, averages for key multiples)
        - Peer comparison multiples (same metrics for direct competitors)
        - Analyst price targets (low, mean, median, high, number of analysts)
        - Analyst rating distribution (buy/hold/sell counts, recent changes)
        - DCF inputs (growth assumptions, margin trajectory, WACC components, terminal value)
        - Sum-of-the-parts considerations if applicable
        - Forward estimates (revenue, EPS) and implied growth rates
        - Premium/discount drivers vs. peers (growth, quality, risk profile)
        - Recent valuation shifts and catalysts driving re-rating

        **Step 0: Decompose your research brief into specific questions.**
        Before searching, break this topic into 5-10 specific questions you need to answer.
        For each question, formulate 2-3 search queries using different terminology.
        For example, "analyst price targets" might also be searched as "consensus estimate",
        "Wall Street rating", "buy sell recommendation". This ensures comprehensive
        retrieval from the index.

        1. Retrieve everything already discovered for this section:
          Run: uv run python skills/search_index/search_index.py --all --workdir ${workdir} --sections valuation
          Read artifacts/manifest.json for a description of all available artifacts and review relevant artifacts.
          Review these results carefully — this is what we already have from financial data, analyst estimates, and other ingested sources.

        2. Identify gaps in the existing material, then use MCP tools to research current multiples, analyst consensus, and peer comparisons.

        3. Read relevant structured artifacts in artifacts/ (JSON, CSV files) for specific data points.

        4. **Evaluate information sufficiency.** Review your findings against the research brief.
          List any gaps — questions you cannot yet answer with evidence. For each gap:
          - Run additional search_index.py queries with different search terms
          - Try alternative MCP tool calls with different parameters
          Repeat until all brief questions are addressed or you've exhausted available
          sources (max 2 additional search rounds).

        ${research_output_instructions}

        Save your findings to knowledge/findings_valuation.md
      disallowed_tools: []
    outputs:
      findings: {path: "knowledge/findings_valuation.md", format: md, description: "Research findings on valuation multiples, analyst targets, and DCF inputs"}

