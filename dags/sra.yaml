dag:
  version: 2
  name: Equity Research Report Bot
  inputs:
    ticker: "${ticker}"
    workdir: "${workdir}"
  root_dir: /Users/drucev/projects/sra4
  template_dir: templates
  drafts_dir: drafts
  data_dir: data # not implemented, in future write reports based on user-provided data
  allowed_tools: all # not implemented, all allowed, in future limit tools

tasks:
  # --- Data gathering tasks ---
  profile:
    description: Get company profile data based on symbol
    type: python
    config:
      script: skills/fetch_profile/fetch_profile.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      profile:    {path: "artifacts/profile.json", format: json, description: "Company identity (name, sector, industry, country, employees), valuation snapshot (market cap, price, 52-week range, beta, shares outstanding)"}
      peers_list: {path: "artifacts/peers_list.json", format: json, description: "Peer companies with symbol, name, price, and market cap; includes provider source and Claude-filtered flag"}
    sets_vars:
      symbol:       {artifact: "artifacts/profile.json", key: "symbol"}
      company_name: {artifact: "artifacts/profile.json", key: "company_name"}

  technical:
    description: Generate stock chart and technical indicators
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_technical/fetch_technical.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      chart:              {path: "artifacts/chart.png", format: png, description: "1-year stock price chart with SMA-50, SMA-200, volume bars, RSI subplot, and MACD subplot"}
      technical_analysis: {path: "artifacts/technical_analysis.json", format: json, description: "Technical indicators: SMA, EMA, RSI, MACD, Bollinger Bands, ATR, OBV, support/resistance levels, and trend signals"}

  fundamental:
    description: Fetch financial statements, ratios, and analyst data
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_fundamental/fetch_fundamental.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
        peers_file: "artifacts/peers_list.json"
    outputs:
      income_statement:        {path: "artifacts/income_statement.csv", format: csv, description: "Annual income statement: revenue, COGS, gross profit, operating income, net income, EPS, shares outstanding"}
      balance_sheet:           {path: "artifacts/balance_sheet.csv", format: csv, description: "Annual balance sheet: total assets, liabilities, equity, cash, debt, working capital, book value per share"}
      cash_flow:               {path: "artifacts/cash_flow.csv", format: csv, description: "Annual cash flow statement: operating, investing, financing cash flows, CapEx, free cash flow"}
      key_ratios:              {path: "artifacts/key_ratios.csv", format: csv, description: "Financial ratios for company and peers: P/E, P/B, P/S, EV/EBITDA, ROE, ROA, debt/equity, margins"}
      analyst_recommendations: {path: "artifacts/analyst_recommendations.json", format: json, description: "Wall Street analyst consensus: buy/hold/sell counts, price targets (low/mean/median/high), recent rating changes"}

  perplexity:
    description: Research news, business profile, and executives via Perplexity AI
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_perplexity/fetch_perplexity.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      news_stories:       {path: "artifacts/news_stories.md", format: md, description: "Recent news stories and developments sourced via Perplexity AI with citations"}
      business_profile:   {path: "artifacts/business_profile.md", format: md, description: "Narrative business overview: history, products, markets, strategy, and competitive positioning via Perplexity AI"}
      executive_profiles: {path: "artifacts/executive_profiles.md", format: md, description: "Key executive bios: name, title, background, tenure, and notable achievements via Perplexity AI"}

  fetch_edgar:
    description: Fetch SEC filings (10-K, 10-Q, 8-K) via edgartools
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_edgar/fetch_edgar.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      filings_index: {path: "artifacts/filings_index.json", format: json, description: "Index of all fetched SEC filings with filing type, date, accession number, and local file paths"}
      10k_items:     {path: "artifacts/", format: md, description: "Extracted 10-K annual report sections: business overview, risk factors, MD&A, financial statements, and notes"}
      10q_items:     {path: "artifacts/", format: md, description: "Extracted 10-Q quarterly report sections: MD&A, financial statements, and risk factor updates"}
      financials:    {path: "artifacts/", format: csv, description: "SEC-sourced financial data tables extracted from XBRL filings"}
      8k_summary:    {path: "artifacts/8k_summary.json", format: json, description: "Recent 8-K current report summaries: material events, management changes, financial results announcements"}

  wikipedia:
    description: Fetch Wikipedia company summary
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_wikipedia/fetch_wikipedia.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      wikipedia_summary: {path: "artifacts/wikipedia_summary.txt", format: txt, description: "Wikipedia article summary providing company history, operations, and public background"}
      wikipedia_full:    {path: "artifacts/wikipedia_full.txt", format: txt, description: "Full Wikipedia article text with complete detail on company history, operations, and background"}

  perplexity_analysis:
    description: Generate business model, competitive, risk, and investment analysis via Perplexity
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_perplexity_analysis/fetch_perplexity_analysis.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      business_model: {path: "artifacts/business_model_analysis.md", format: md, description: "Business model deep-dive: revenue streams, unit economics, scalability, and moat analysis via Perplexity AI"}
      competitive:    {path: "artifacts/competitive_analysis.md", format: md, description: "Competitive landscape: market share, key rivals, differentiation, and positioning analysis via Perplexity AI"}
      risk:           {path: "artifacts/risk_analysis.md", format: md, description: "Risk factor analysis: regulatory, market, operational, financial, and strategic risks via Perplexity AI"}
      investment:     {path: "artifacts/investment_thesis.md", format: md, description: "Investment thesis: bull/bear cases, catalysts, valuation considerations, and recommendation framework via Perplexity AI"}

  # --- Body section writing tasks (Claude subagents, run in parallel) ---
  write_profile:
    description: "Write Section 2: Extended Profile"
    type: claude
    depends_on: [profile, technical, fundamental, perplexity, fetch_edgar, wikipedia, perplexity_analysis]
    config:
      system: "You are a senior equity research analyst writing a professional report. Read and follow the style guide at ../../STYLE.md."
      disallowed_tools: []
      prompt: |
        I have collected comprehensive information on ${ticker} in the directory ${workdir}.

        IMPORTANT: Read the style guide at ../../STYLE.md before writing. Follow its formatting conventions, source reliability hierarchy, and naming conventions.

        You also have access to powerful financial research tools through MCP servers. Use these tools to:
        - Fill gaps in the provided research
        - Find recent developments not covered in the report
        - Gather additional market data and competitive intelligence
        - The provided artifacts are up to date, you do not need to verify them unless there is contradictory information

        Write Section 2 of an equity research report on ${ticker}: Extended Profile.

        Cover:
        • History with origin story and key historical milestones
        • Core business and competitors
        • Recent major news

        Use a straightforward, factual tone throughout the analysis. Focus on data and observable facts rather than speculation.

        Save results in markdown format to drafts/section_2_profile.md
      n_iterations: 1
      critic_prompt: |
        Read the draft section at ${draft_path} carefully and critique it for an equity research report.

        Evaluate for:
        - Clarity and readability
        - Factual accuracy — cross-check claims against data in artifacts/
        - Missing or incomplete analysis
        - Unsupported claims or speculation
        - Repetition
        - Professional tone and formatting
        - Compliance with the style guide at ../../STYLE.md (formatting conventions, source hierarchy, naming)

        Write a numbered list of specific issues to address, ordered by importance.
        For each issue, explain what's wrong and suggest how to fix it.

        Save your critique to ${critique_path}.
      rewrite_prompt: |
        Read the current draft at ${draft_path} and the critique at ${critique_path}.

        Address each issue identified in the critique:
        - Improve clarity and readability
        - Remove repetition
        - Fix factual inaccuracies using data from artifacts/
        - Elaborate on incomplete analysis using existing artifacts
        - Remove or substantiate unsupported claims
        - Ensure professional tone
        - Follow the style guide at ../../STYLE.md

        Do not introduce new research. Use existing artifacts to resolve issues.
        If you cannot verify a claim from the artifacts, make the language more hedged or remove it.

        Save the revised section to ${rewrite_path}.
      critic_model: claude-sonnet-4-6
      rewrite_model: claude-sonnet-4-6
      critic_disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      rewrite_disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
    outputs:
      section: {path: "artifacts/section_2_profile.md", format: md, description: "Section 2: Extended profile covering company history, core business, competitors, and recent news"}

