        Address each issue identified. Save the revised version to ${rewrite_path}.
    outputs:
      section: {path: "artifacts/conclusion.md", format: md, description: "Report conclusion: SWOT analysis, bull/bear cases, risk assessment, and monitoring watchpoints"}

  write_intro:
    sort_order: 40
    description: Write the main report intro
    type: claude
    depends_on: [assemble_body, write_conclusion]
    config:
      system: "You are a senior equity research analyst writing a professional report. Read and follow the style guide at ../../STYLE.md."
      disallowed_tools: [WebSearch, WebFetch, Agent, Skill, Bash, yfinance, alphavantage, brave-search, wikipedia, openbb-mcp, playwright, fetch, filesystem]
      artifacts_inline:
        - artifacts/manifest.json
        - artifacts/profile.json
      prompt: |
        ${artifact_context_inline}

        read the report body at artifacts/assembled_body.md and the conclusion at artifacts/conclusion.md carefully, then write a short introductory paragraph < 100 words.

        start with "## Introduction" header.

        Use a straightforward, factual tone throughout the analysis.

        Save results in markdown format to drafts/intro.md.
      hard_checks:
        - "max_length: 1000"
        - "startswith: ## Introduction"

      hard_check_retries: 2
      rewrite_prompt: |
        Read the current draft at ${draft_path} and the critique at ${critique_path}.
        Address each issue identified. Save the revised version to ${rewrite_path}.
    outputs:
      section: {path: "artifacts/intro.md", format: md, description: "Short introductory paragraph (<100 words) summarizing the report scope and key findings"}

  assemble_text:
    sort_order: 41
    description: Assemble the 3 text sections into a complete report
    type: python
    depends_on: [assemble_body,write_conclusion, write_intro]
    config:
      script: skills/render_template.py
      args:
        template: templates/assemble_report.md.j2
        output: "${workdir}/artifacts/report_body.md"
        json: "${workdir}/artifacts/profile.json"
        file: "intro=${workdir}/artifacts/intro.md body=${workdir}/artifacts/assembled_body.md conclusion=${workdir}/artifacts/conclusion.md"
    outputs:
      body_text: {path: "artifacts/report_body.md", format: md, description: "Assembled full report: intro + body sections 2-8 + conclusion in final markdown format"}

  critique_body_final:
    sort_order: 42
    description: Critique the assembled report and identify issues to address
    type: claude
    depends_on: [assemble_text]
    config:
      system: "You are a senior equity research editor with expertise in financial analysis and report quality. Read and follow the style guide at ../../STYLE.md."
      model: claude-sonnet-4-6
      max_budget_usd: 1.00
      disallowed_tools: [WebSearch, WebFetch, Agent, Skill, Bash, yfinance, alphavantage, brave-search, wikipedia, openbb-mcp, playwright, fetch, filesystem]
      artifacts_inline:
        - artifacts/manifest.json
        - artifacts/profile.json
        - artifacts/key_ratios.csv
        - artifacts/analyst_recommendations.json
        - artifacts/technical_analysis.json
        - artifacts/8k_summary.json
        - artifacts/cross_check.json
      prompt: |
        ${artifact_context_inline}

        Read the assembled report text at artifacts/report_body.md carefully and provide a detailed critique.

        Also read the cross-section consistency check at artifacts/cross_check.json.
        Address any number inconsistencies, contradictions, redundancies, or gaps identified there.

        Evaluate the report for:
        - Following the structure exactly, with these exact numbered headings and no missing sections
          - Introduction (not numbered)
          - 1. Company Profile
          - 2. Business Model
          - 3. Competitive Landscape
          - 4. Supply Chain Positioning
          - 5. Financial Strength
          - 6. Valuation
          - 7. Risks
          - Conclusion: Investment Thesis
        - Clarity and readability
        - Repetition; similar details and points should not be repeated in different sections. As an example, early summary sections and later concluding sections can REFER to e.g. supply chain issues but SHOULD NOT detail at length the same issues discussed comprehensively in the supply chain part of the report.
        - Factual accuracy and consistency
        - Missing or incomplete analysis
        - Logical flow
        - Data quality and sourcing
        - Professional tone and formatting
        - Unsupported claims or speculation
        - Areas needing additional research or verification
        - Compliance with the style guide at ../../STYLE.md (formatting conventions, source hierarchy, naming)

        Write a numbered list of specific issues to address, ordered by importance.
        For each issue, explain what's wrong and suggest how to fix it.

        Save the critique to artifacts/report_critique.md
    outputs:
      critique: {path: "artifacts/report_critique.md", format: md, description: "Numbered list of issues identified in the report with explanations and suggested fixes"}

  polish_body_final:
    sort_order: 43
    description: Revise the report based on critique feedback
    type: claude
    depends_on: [critique_body_final]
    config:
      system: "You are a senior equity research analyst revising a report based on editorial feedback. Read and follow the style guide at ../../STYLE.md."
      model: claude-sonnet-4-6
      max_budget_usd: 10.00
      timeout: 3600
      pre_copy:
        - from: artifacts/report_body.md
          to: artifacts/report_body_final.md
      disallowed_tools: [WebSearch, WebFetch, Agent, Skill, Bash, yfinance, alphavantage, brave-search, wikipedia, openbb-mcp, playwright, fetch]
      prompt: |
        ## Your task

        Revise artifacts/report_body.md based on the critique at artifacts/report_critique.md.
        The output must be saved to artifacts/report_body_final.md.

        ## Method — CRITICAL: follow these steps in exact order

        artifacts/report_body_final.md already exists as a copy of report_body.md. Your job is to edit it in place.

        Step 1. Read artifacts/report_critique.md. Summarize each critique item as a one-line bullet (item number + what to fix + approximate line range).

        Step 2. Process critique items ONE AT A TIME on artifacts/report_body_final.md:
           a. Read ONLY the 20-40 lines around the issue (use offset/limit — NEVER read the whole file)
           b. Apply the fix with the Edit tool
           c. Move to the next item immediately — do not plan ahead or re-read other sections

        Step 3. After all edits are complete, spot-check: read the the 1st and last 20 lines to confirm the file is intact.

        ## CONTEXT BUDGET RULES — if you violate these, the task will fail

        - NEVER read the full report body file. Only read 20-50 lines at a time using offset/limit.
        - NEVER try to rewrite the entire file — use Edit for surgical changes
        - Keep thinking SHORT. Do not analyze all items at once. Process them one by one.
        - For file reads, only read artifacts/report_critique.md and small sections (20-50 lines) of artifacts/report_body_final.md. Reference data is provided inline above — do not read additional artifact files.

        ## Edit guidelines

        - Remove repetition and duplication. Keep only the best version and merge others into it; replace others with a reference like "as detailed in Section X".
        - Fix factual inaccuracies using the inline artifacts. Delete statements or make them general rather than embarking on new research.
        - Improve clarity, logical flow, tone, and formatting.
        - Do not introduce new information or conduct new research. If there is a contradiction between the critique and the artifacts, trust the artifacts. If there is a contradiction between artifacts, note it.

        IMPORTANT: this report will be assembled with a header including title, charts, technical analysis, peer comparison table. The body text must start at "## Introduction", without any title or header.
    outputs:
      final_report: {path: "artifacts/report_body_final.md", format: md, description: "Final polished report incorporating all critique feedback and revisions"}

  final_assembly:
    sort_order: 44
    description: Assemble all report components into final formatted report using Jinja2 template
    type: python
    depends_on: [polish_body_final]
    config:
      script: skills/render_final.py
      args:
        workdir: "${workdir}"
    outputs:
      final_report: {path: "artifacts/final_report.md", format: md, description: "Complete formatted report with title, charts, tables, and polished body content assembled via Jinja2 template"}

  evaluate_report:
    sort_order: 45
    description: Evaluate final report quality with structured scoring
    type: claude
    depends_on: [final_assembly]
    config:
      system: "You are an independent report quality assessor for institutional equity research."
      model: claude-sonnet-4-6
      max_budget_usd: 0.50
      disallowed_tools: [WebSearch, WebFetch, Agent, Skill, Bash, yfinance, alphavantage, brave-search, wikipedia, openbb-mcp, playwright, fetch, filesystem]
      artifacts_inline:
        - artifacts/manifest.json
        - artifacts/profile.json
        - artifacts/key_ratios.csv
        - artifacts/analyst_recommendations.json
      prompt: |
        ${artifact_context_inline}

        Read the final report at artifacts/final_report.md carefully.

        Score this report on the following dimensions (1-5 scale, with justification):

        1. **Factual Accuracy** (spot-check 10 specific claims against the inline source artifacts):
           For each claim checked, state the claim, the source value, and whether they match.
           Score reflects the proportion of verified claims.

        2. **Completeness** (does the report cover all aspects an equity analyst would need?):
           List any material topics missing. Score reflects coverage breadth.

        3. **Consistency** (do numbers and narratives match across sections?):
           Note any internal contradictions found. Score reflects consistency.

        4. **Analytical Depth** (does the report go beyond restating facts to provide insight?):
           Identify sections with strong vs. weak analysis. Score reflects depth.

        5. **Actionability** (does the conclusion give clear, specific investment guidance?):
           Assess whether a portfolio manager could act on this report. Score reflects usefulness.

        6. **Source Attribution** (are claims properly attributed to specific sources?):
           Note any unsourced claims. Score reflects attribution quality.

        Output a JSON evaluation:
        {
          "scores": {
            "factual_accuracy": {"score": N, "justification": "...", "spot_checks": [...]},
            "completeness": {"score": N, "justification": "...", "missing_topics": [...]},
            "consistency": {"score": N, "justification": "...", "contradictions": [...]},
            "analytical_depth": {"score": N, "justification": "..."},
            "actionability": {"score": N, "justification": "..."},
            "source_attribution": {"score": N, "justification": "..."}
          },
          "overall_score": N,
          "summary": "...",
          "top_improvements": ["...", "...", "..."]
        }

        Save to artifacts/report_evaluation.json
    outputs:
      evaluation: {path: "artifacts/report_evaluation.json", format: json, description: "Structured quality evaluation with scores across 6 dimensions"}
