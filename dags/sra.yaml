        - Improve clarity and readability
        - Remove repetition
        - Fix factual inaccuracies using data from artifacts/
        - Elaborate on incomplete analysis using existing artifacts
        - Remove or substantiate unsupported claims
        - Ensure professional tone
        - Follow the style guide at ../../STYLE.md

        Do not introduce new research. Use existing artifacts to resolve issues.
        If you cannot verify a claim from the artifacts, make the language more hedged or remove it.

        Save the revised section to ${rewrite_path}.
      critic_model: claude-sonnet-4-6
      rewrite_model: claude-sonnet-4-6
      critic_disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      rewrite_disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
    outputs:
      section: {path: "artifacts/section_8_risk_news.md", format: md, description: "Section 8: Recent developments, news, and risk factors from deep research"}

  assemble_body:
    description: Assemble the 7 body sections into a single report body
    type: python
    depends_on: [write_profile, write_business_model, write_competitive, write_supply_chain, write_financial, write_valuation, write_risk_news]
    config:
      script: skills/render_template.py
      args:
        template: templates/assemble_body.md.j2
        output: "${workdir}/artifacts/assembled_body.md"
        file: "section_2=${workdir}/artifacts/section_2_profile.md section_3=${workdir}/artifacts/section_3_business_model.md section_4=${workdir}/artifacts/section_4_competitive.md section_5=${workdir}/artifacts/section_5_supply_chain.md section_6=${workdir}/artifacts/section_6_financial.md section_7=${workdir}/artifacts/section_7_valuation.md section_8=${workdir}/artifacts/section_8_risk_news.md"
    outputs:
      body_text: {path: "artifacts/assembled_body.md", format: md, description: "Assembled report body combining all 7 sections (2-8) into a single document"}

  write_conclusion:
    description: Write the main report conclusion
    type: claude
    depends_on: [assemble_body]
    config:
      system: "You are a senior equity research analyst writing a professional report. Read and follow the style guide at ../../STYLE.md."
      disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      prompt: |
        read the report body at artifacts/assembled_body.md carefully and write a concluding 1-3 short paragraphs < 500 words total.
            • Summarize the company's strategic position and the stock's investment risk/reward profile
            • Do not repeat at length but draw on the most salient points from the report body: SWOT, bull/bear cases, risk assessment, and monitoring watchpoints.

        Use a straightforward, factual tone throughout the analysis. Focus on data and observable facts rather than speculation.

        Save results in markdown format to artifacts/conclusion.md.
    outputs:
      section: {path: "artifacts/conclusion.md", format: md, description: "Report conclusion: SWOT analysis, bull/bear cases, risk assessment, and monitoring watchpoints"}

  write_intro:
    description: Write the main report intro
    type: claude
    depends_on: [assemble_body, write_conclusion]
    config:
      system: "You are a senior equity research analyst writing a professional report. Read and follow the style guide at ../../STYLE.md."
      disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      prompt: |
        read the report body at artifacts/assembled_body.md and the conclusion at artifacts/conclusion.md carefully, then write a short introductory paragraph < 100 words.

        Use a straightforward, factual tone throughout the analysis.

        Save results in markdown format to artifacts/intro.md.
    outputs:
      section: {path: "artifacts/intro.md", format: md, description: "Short introductory paragraph (<100 words) summarizing the report scope and key findings"}

  assemble_text:
    description: Assemble the 3 text sections into a complete report
    type: python
    depends_on: [write_intro, assemble_body, write_conclusion]
    config:
      script: skills/render_template.py
      args:
        template: templates/assemble_report.md.j2
        output: "${workdir}/artifacts/report_body.md"
        json: "${workdir}/artifacts/profile.json"
        file: "intro=${workdir}/artifacts/intro.md body=${workdir}/artifacts/assembled_body.md conclusion=${workdir}/artifacts/conclusion.md"
    outputs:
      body_text: {path: "artifacts/report_body.md", format: md, description: "Assembled full report: intro + body sections 2-8 + conclusion in final markdown format"}

  critique_body_final:
    description: Critique the assembled report and identify issues to address
    type: claude
    depends_on: [assemble_text]
    config:
      system: "You are a senior equity research editor with expertise in financial analysis and report quality. Read and follow the style guide at ../../STYLE.md."
      model: claude-sonnet-4-6
      max_budget_usd: 1.00
      disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      prompt: |
        Read the assembled report text at artifacts/report_body.md carefully and provide a detailed critique.

        Evaluate the report for:
        - Clarity and readability
        - Repetition; For instance, early summary sections can refer to supply chain issues but should not go into details if this is discussed comprehensively later.
        - Factual accuracy and consistency
        - Missing or incomplete analysis
        - Logical flow
        - Data quality and sourcing
        - Professional tone and formatting
        - Unsupported claims or speculation
        - Areas needing additional research or verification
        - Compliance with the style guide at ../../STYLE.md (formatting conventions, source hierarchy, naming)

        Write a numbered list of specific issues to address, ordered by importance.
        For each issue, explain what's wrong and suggest how to fix it.

        Save the critique to artifacts/report_critique.md
    outputs:
      critique: {path: "artifacts/report_critique.md", format: md, description: "Numbered list of issues identified in the report with explanations and suggested fixes"}

  polish_body_final:
    description: Revise the report based on critique feedback
    type: claude
    depends_on: [critique_body_final]
    config:
      system: "You are a senior equity research analyst revising a report based on editorial feedback. Read and follow the style guide at ../../STYLE.md."
      model: claude-sonnet-4-6
      max_budget_usd: 1.00
      disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      prompt: |
        Read the critique at artifacts/report_critique.md and the current report text at artifacts/report_body.md.

        Carefully address each issue identified in the critique:
        - Improve clarity and readability
        - Remove repetition
        - Fix factual inaccuracies or inconsistencies. Attempt to verify in the available artifacts. Delete statements or make them more general rather than embarking on new research.
        - Elaborate on missing or incomplete analysis. Again, use existing artifacts rather than going down a new rabbit hole.
        - Improve logical flow and structure
        - Enhance data quality and sourcing citations
        - Ensure professional tone and formatting
        - Remove or substantiate any unsupported claims using provided artifacts.

        Do not introduce new information or conduct new research. Resolve using the provided artifacts.. If there is a contradiction between the critique and the artifacts, trust the artifacts. If there is a contradictin between artifacts, note the contradiction.

        IMPORTANT:
          - this report will be assembled with a header including title, charts, technical analysis, peer comparison table. Return only the body text starting at section 1, Introduction, without any title or header.

        Save the revised report to artifacts/report_body_final.md.
    outputs:
      final_report: {path: "artifacts/report_body_final.md", format: md, description: "Final polished report incorporating all critique feedback and revisions"}

  final_assembly:
    description: Assemble all report components into final formatted report using Jinja2 template
    type: python
    depends_on: [polish_body_final, technical, fundamental]
    config:
      script: skills/render_final.py
      args:
        workdir: "${workdir}"
    outputs:
      final_report: {path: "artifacts/final_report.md", format: md, description: "Complete formatted report with title, charts, tables, and polished body content assembled via Jinja2 template"}
