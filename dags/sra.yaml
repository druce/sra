dag:
  version: 2
  name: Equity Research Report Bot
  inputs:
    ticker: "${ticker}"
    workdir: "${workdir}"
  root_dir: /Users/drucev/projects/sra5
  template_dir: templates
  drafts_dir: drafts
  data_dir: data # not implemented, in future write reports based on user-provided data
  allowed_tools: all # not implemented, all allowed, in future limit tools

tasks:
  # --- Data gathering tasks ---
  profile:
    sort_order: 1
    description: Get company profile data based on symbol
    type: python
    config:
      script: skills/fetch_profile/fetch_profile.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      profile:    {path: "artifacts/profile.json", format: json, description: "Company identity (name, sector, industry, country, employees), valuation snapshot (market cap, price, 52-week range, beta, shares outstanding)"}
      peers_list: {path: "artifacts/peers_list.json", format: json, description: "Peer companies with symbol, name, price, and market cap; includes provider source and Claude-filtered flag"}
    sets_vars:
      symbol:       {artifact: "artifacts/profile.json", key: "symbol"}
      company_name: {artifact: "artifacts/profile.json", key: "company_name"}

  technical:
    sort_order: 2
    description: Generate stock chart and technical indicators
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_technical/fetch_technical.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      chart:              {path: "artifacts/chart.png", format: png, description: "1-year stock price chart with SMA-50, SMA-200, volume bars, RSI subplot, and MACD subplot"}
      technical_analysis: {path: "artifacts/technical_analysis.json", format: json, description: "Technical indicators: SMA, EMA, RSI, MACD, Bollinger Bands, ATR, OBV, support/resistance levels, and trend signals"}

  fundamental:
    sort_order: 3
    description: Fetch financial statements, ratios, and analyst data
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_fundamental/fetch_fundamental.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
        peers_file: "artifacts/peers_list.json"
    outputs:
      income_statement:        {path: "artifacts/income_statement.csv", format: csv, description: "Annual income statement: revenue, COGS, gross profit, operating income, net income, EPS, shares outstanding"}
      balance_sheet:           {path: "artifacts/balance_sheet.csv", format: csv, description: "Annual balance sheet: total assets, liabilities, equity, cash, debt, working capital, book value per share"}
      cash_flow:               {path: "artifacts/cash_flow.csv", format: csv, description: "Annual cash flow statement: operating, investing, financing cash flows, CapEx, free cash flow"}
      key_ratios:              {path: "artifacts/key_ratios.csv", format: csv, description: "Financial ratios for company and peers: P/E, P/B, P/S, EV/EBITDA, ROE, ROA, debt/equity, margins"}
      analyst_recommendations: {path: "artifacts/analyst_recommendations.json", format: json, description: "Wall Street analyst consensus: buy/hold/sell counts, price targets (low/mean/median/high), recent rating changes"}

  perplexity:
    sort_order: 4
    description: Research news, business profile, and executives via Perplexity AI
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_perplexity/fetch_perplexity.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      news_stories:       {path: "artifacts/news_stories.md", format: md, description: "Recent news stories and developments sourced via Perplexity AI with citations"}
      business_profile:   {path: "artifacts/business_profile.md", format: md, description: "Narrative business overview: history, products, markets, strategy, and competitive positioning via Perplexity AI"}
      executive_profiles: {path: "artifacts/executive_profiles.md", format: md, description: "Key executive bios: name, title, background, tenure, and notable achievements via Perplexity AI"}

  fetch_edgar:
    sort_order: 5
    description: Fetch SEC filings (10-K, 10-Q, 8-K) via edgartools
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_edgar/fetch_edgar.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      filings_index: {path: "artifacts/filings_index.json", format: json, description: "Index of all fetched SEC filings with filing type, date, accession number, and local file paths"}
      10k_items:     {path: "artifacts/", format: md, description: "Extracted 10-K annual report sections: business overview, risk factors, MD&A, financial statements, and notes"}
      10q_items:     {path: "artifacts/", format: md, description: "Extracted 10-Q quarterly report sections: MD&A, financial statements, and risk factor updates"}
      financials:    {path: "artifacts/", format: csv, description: "SEC-sourced financial data tables extracted from XBRL filings"}
      8k_summary:    {path: "artifacts/8k_summary.json", format: json, description: "Recent 8-K current report summaries: material events, management changes, financial results announcements"}

  wikipedia:
    sort_order: 6
    description: Fetch Wikipedia company summary
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_wikipedia/fetch_wikipedia.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      wikipedia_summary: {path: "artifacts/wikipedia_summary.txt", format: txt, description: "Wikipedia article summary providing company history, operations, and public background"}
      wikipedia_full:    {path: "artifacts/wikipedia_full.txt", format: txt, description: "Full Wikipedia article text with complete detail on company history, operations, and background"}

  perplexity_analysis:
    sort_order: 7
    description: Generate business model, competitive, risk, and investment analysis via Perplexity
    type: python
    depends_on: [profile]
    config:
      script: skills/fetch_perplexity_analysis/fetch_perplexity_analysis.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      business_model: {path: "artifacts/business_model_analysis.md", format: md, description: "Business model deep-dive: revenue streams, unit economics, scalability, and moat analysis via Perplexity AI"}
      competitive:    {path: "artifacts/competitive_analysis.md", format: md, description: "Competitive landscape: market share, key rivals, differentiation, and positioning analysis via Perplexity AI"}
      risk:           {path: "artifacts/risk_analysis.md", format: md, description: "Risk factor analysis: regulatory, market, operational, financial, and strategic risks via Perplexity AI"}
      investment:     {path: "artifacts/investment_thesis.md", format: md, description: "Investment thesis: bull/bear cases, catalysts, valuation considerations, and recommendation framework via Perplexity AI"}

  # --- Chunk, tag, and index wave ---
  chunk_documents:
    sort_order: 15
    description: Chunk and embed text artifacts for hybrid retrieval
    type: python
    depends_on: [profile, technical, fundamental, perplexity, fetch_edgar, wikipedia, perplexity_analysis]
    config:
      script: skills/chunk_index/chunk_documents.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      chunks: {path: "artifacts/chunks.json", format: json, description: "Text chunks with embeddings from all text artifacts"}

  tag_chunks:
    sort_order: 16
    description: Assign section relevance tags to each chunk using AI
    type: claude
    depends_on: [chunk_documents]
    config:
      prompt: |
        Read artifacts/chunks.json. For each chunk, assign relevance tags from this list:
        profile, business_model, competitive, supply_chain, financial, valuation, risk_news

        A chunk may have multiple tags if it is relevant to multiple sections.
        Apply tags generously — it is better to over-tag than under-tag.

        Write a JSON file to artifacts/chunk_tags.json in this exact format:
        [{"id": "<chunk_id>", "tags": ["tag1", "tag2"]}, ...]

        Include every chunk from chunks.json. Do not skip any.
      disallowed_tools: [WebSearch, WebFetch]
    outputs:
      chunk_tags: {path: "artifacts/chunk_tags.json", format: json, description: "Section relevance tags for each chunk"}

  build_index:
    sort_order: 17
    description: Build LanceDB hybrid vector+BM25 index from chunks and tags
    type: python
    depends_on: [tag_chunks]
    config:
      script: skills/chunk_index/build_index.py
      args:
        ticker: "${ticker}"
        workdir: "${workdir}"
    outputs:
      index: {path: "artifacts/index/", format: lancedb, description: "LanceDB hybrid search index of all chunked artifacts"}

  # --- Research agent tasks (Claude subagents with MCP tools, run in parallel) ---
  research_profile:
    sort_order: 18
    description: Research company profile, history, and management
    type: claude
    depends_on: [build_index, profile, perplexity, wikipedia, perplexity_analysis]
    config:
      mcp_config: [mcp-research.json]
      prompt: |
        You are a research analyst investigating ${company_name} (${symbol}).
        Your domain: company profile, history, management, and business overview.

        1. Search the artifact index for relevant background:
           Run: uv run python skills/search_index/search_index.py "company history overview management" --workdir ${workdir} --sections profile --top-k 15

        2. Use available MCP tools to fill gaps (company profile, executives, Wikipedia).

        3. For each significant finding, record it with:
           uv run python skills/db.py finding-add --workdir ${workdir} --task-id research_profile \
             --content "<finding>" --source "<source>" --tags profile [other_relevant_tags...]

        Tag any finding cross-relevant to other sections (e.g. leadership changes → risk_news).
        Aim for at least 10 substantial findings.
      disallowed_tools: [WebSearch, WebFetch]

  research_business:
    sort_order: 18
    description: Research business model, revenue streams, and competitive moat
    type: claude
    depends_on: [build_index, profile, perplexity, perplexity_analysis]
    config:
      mcp_config: [mcp-research.json]
      prompt: |
        You are a research analyst investigating ${company_name} (${symbol}).
        Your domain: business model, revenue streams, unit economics, and competitive moat.

        1. Search the artifact index:
           Run: uv run python skills/search_index/search_index.py "business model revenue streams products segments" --workdir ${workdir} --sections business_model --top-k 15

        2. Use available MCP tools to research revenue breakdown, segment trends, and moat sources.

        3. Record each finding:
           uv run python skills/db.py finding-add --workdir ${workdir} --task-id research_business \
             --content "<finding>" --source "<source>" --tags business_model [other_relevant_tags...]

        Tag cross-relevant findings (e.g. margin structure → financial, moat → competitive).
        Aim for at least 10 substantial findings.
      disallowed_tools: [WebSearch, WebFetch]

  research_competitive:
    sort_order: 18
    description: Research competitive landscape, market share, and industry dynamics
    type: claude
    depends_on: [build_index, profile, perplexity, perplexity_analysis, fundamental]
    config:
      mcp_config: [mcp-research.json]
      prompt: |
        You are a research analyst investigating ${company_name} (${symbol}).
        Your domain: competitive landscape, market share, industry dynamics, and positioning.

        1. Search the artifact index:
           Run: uv run python skills/search_index/search_index.py "competitors market share industry landscape" --workdir ${workdir} --sections competitive --top-k 15

        2. Use available MCP tools to research competitors, peer financials, and market dynamics.

        3. Record each finding:
           uv run python skills/db.py finding-add --workdir ${workdir} --task-id research_competitive \
             --content "<finding>" --source "<source>" --tags competitive [other_relevant_tags...]

        Cross-tag relevant findings to supply_chain, valuation, or risk_news as appropriate.
        Aim for at least 10 substantial findings.
      disallowed_tools: [WebSearch, WebFetch]

  research_supply_chain:
    sort_order: 18
    description: Research supply chain, manufacturing dependencies, and geopolitical exposure
    type: claude
    depends_on: [build_index, profile, fetch_edgar, perplexity_analysis]
    config:
      mcp_config: [mcp-research.json]
      prompt: |
        You are a research analyst investigating ${company_name} (${symbol}).
        Your domain: supply chain, manufacturing partners, input dependencies, and geopolitical exposure.

        1. Search the artifact index:
           Run: uv run python skills/search_index/search_index.py "supply chain manufacturing suppliers dependencies" --workdir ${workdir} --sections supply_chain --top-k 15

        2. Use available MCP tools to research key suppliers, concentration risk, and geographic exposure.

        3. Record each finding:
           uv run python skills/db.py finding-add --workdir ${workdir} --task-id research_supply_chain \
             --content "<finding>" --source "<source>" --tags supply_chain [other_relevant_tags...]

        Cross-tag relevant findings to risk_news or competitive as appropriate.
        Aim for at least 10 substantial findings.
      disallowed_tools: [WebSearch, WebFetch]

  research_financial:
    sort_order: 18
    description: Research financial performance, growth trends, and key metrics
    type: claude
    depends_on: [build_index, profile, fundamental, fetch_edgar]
    config:
      mcp_config: [mcp-research.json]
      prompt: |
        You are a research analyst investigating ${company_name} (${symbol}).
        Your domain: financial performance — revenue growth, margins, cash flow, balance sheet, and key ratios.

        1. Search the artifact index:
           Run: uv run python skills/search_index/search_index.py "revenue growth margins profitability cash flow balance sheet" --workdir ${workdir} --sections financial --top-k 15

        2. Use available MCP tools to research financial statements, TTM metrics, and trend analysis.

        3. Record each finding:
           uv run python skills/db.py finding-add --workdir ${workdir} --task-id research_financial \
             --content "<finding>" --source "<source>" --tags financial [other_relevant_tags...]

        Cross-tag findings relevant to valuation (margins, FCF) or risk_news (debt levels).
        Aim for at least 10 substantial findings.
      disallowed_tools: [WebSearch, WebFetch]

  research_valuation:
    sort_order: 18
    description: Research valuation multiples, analyst targets, and DCF inputs
    type: claude
    depends_on: [build_index, profile, fundamental, fetch_edgar]
    config:
      mcp_config: [mcp-research.json]
      prompt: |
        You are a research analyst investigating ${company_name} (${symbol}).
        Your domain: valuation — current multiples, historical ranges, analyst price targets, and DCF inputs.

        1. Search the artifact index:
           Run: uv run python skills/search_index/search_index.py "valuation P/E EV/EBITDA price target analyst" --workdir ${workdir} --sections valuation --top-k 15

        2. Use available MCP tools to research current multiples, analyst consensus, and peer comparisons.

        3. Record each finding:
           uv run python skills/db.py finding-add --workdir ${workdir} --task-id research_valuation \
             --content "<finding>" --source "<source>" --tags valuation [other_relevant_tags...]

        Cross-tag findings relevant to financial (FCF yield, EPS growth) or competitive (peer multiples).
        Aim for at least 10 substantial findings.
      disallowed_tools: [WebSearch, WebFetch]

  research_risk_news:
    sort_order: 18
    description: Research risks, recent news events, and regulatory developments
    type: claude
    depends_on: [build_index, profile, perplexity, fetch_edgar, perplexity_analysis]
    config:
      mcp_config: [mcp-research.json]
      prompt: |
        You are a research analyst investigating ${company_name} (${symbol}).
        Your domain: key risks, recent news events, regulatory developments, and catalysts.

        1. Search the artifact index:
           Run: uv run python skills/search_index/search_index.py "risks regulatory legal news events catalysts" --workdir ${workdir} --sections risk_news --top-k 15

        2. Use available MCP tools to research recent material events, risk factors, and regulatory filings.

        3. Record each finding:
           uv run python skills/db.py finding-add --workdir ${workdir} --task-id research_risk_news \
             --content "<finding>" --source "<source>" --tags risk_news [other_relevant_tags...]

        Cross-tag findings relevant to supply_chain, competitive, or valuation as appropriate.
        Aim for at least 10 substantial findings.
      disallowed_tools: [WebSearch, WebFetch]

  # --- Body section writing tasks (Claude subagents, run in parallel) ---
  write_profile:
    sort_order: 8
    description: "Write Section 2: Extended Profile"
    type: claude
    depends_on: [profile, technical, fundamental, perplexity, fetch_edgar, wikipedia, perplexity_analysis]
    config:
      system: "You are a senior equity research analyst writing a professional report. Read and follow the style guide at ../../STYLE.md."
      disallowed_tools: [WebSearch, WebFetch, Agent, Skill, Bash, yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      artifacts_inline:
        - artifacts/manifest.json
        - artifacts/profile.json
        - artifacts/peers_list.json
        - artifacts/key_ratios.csv
        - artifacts/income_statement.csv
        - artifacts/balance_sheet.csv
        - artifacts/cash_flow.csv
        - artifacts/analyst_recommendations.json
        - artifacts/technical_analysis.json
        - artifacts/news_stories.md
        - artifacts/8k_summary.json
      prompt: |
        I have collected comprehensive information on ${ticker} in the directory ${workdir}.

        IMPORTANT: Read the style guide at ../../STYLE.md before writing. Follow its formatting conventions, source reliability hierarchy, and naming conventions.

        All research data you need is provided in the inline artifacts above and in the artifacts/ directory.
        Use Read and Grep tools to access larger files not included inline.
        Do not attempt external research — synthesize from the provided data only.

        Write Section 2 of an equity research report on ${ticker}: Extended Profile.

        Cover:
        • History with origin story and key historical milestones
        • Core business and competitors
        • Recent major news

        Use a straightforward, factual tone throughout the analysis. Focus on data and observable facts rather than speculation.

        Save results in markdown format to drafts/section_2_profile.md
      n_iterations: 1
      critic_prompt: |
        Read the draft section at ${draft_path} carefully and critique it for an equity research report.

        Evaluate for:
        - Clarity and readability
        - Factual accuracy — cross-check claims against data in artifacts/
        - Missing or incomplete analysis
        - Unsupported claims or speculation
        - Repetition
        - Professional tone and formatting
        - Compliance with the style guide at ../../STYLE.md (formatting conventions, source hierarchy, naming)

        Write a numbered list of specific issues to address, ordered by importance.
        For each issue, explain what's wrong and suggest how to fix it.

        Save your critique to ${critique_path}.
      rewrite_prompt: |
        Read the current draft at ${draft_path} and the critique at ${critique_path}.

        Address each issue identified in the critique:
        - Improve clarity and readability
        - Remove repetition
        - Fix factual inaccuracies using data from artifacts/
        - Elaborate on incomplete analysis using existing artifacts
        - Remove or substantiate unsupported claims
        - Ensure professional tone
        - Follow the style guide at ../../STYLE.md

        Do not introduce new research. Use existing artifacts to resolve issues.
        If you cannot verify a claim from the artifacts, make the language more hedged or remove it.

        Save the revised section to ${rewrite_path}.
      critic_model: claude-sonnet-4-6
      rewrite_model: claude-sonnet-4-6
      critic_disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      rewrite_disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
    outputs:
      section: {path: "artifacts/section_2_profile.md", format: md, description: "Section 2: Extended profile covering company history, core business, competitors, and recent news"}

  write_business_model:
    sort_order: 9
    description: "Write Section 3: Business Model"
    type: claude
    depends_on: [profile, technical, fundamental, perplexity, fetch_edgar, wikipedia, perplexity_analysis]
    config:
      system: "You are a senior equity research analyst writing a professional report. Read and follow the style guide at ../../STYLE.md."
      disallowed_tools: [WebSearch, WebFetch, Agent, Skill, Bash, yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      artifacts_inline:
        - artifacts/manifest.json
        - artifacts/profile.json
        - artifacts/peers_list.json
        - artifacts/key_ratios.csv
        - artifacts/income_statement.csv
        - artifacts/balance_sheet.csv
        - artifacts/cash_flow.csv
        - artifacts/analyst_recommendations.json
        - artifacts/technical_analysis.json
        - artifacts/news_stories.md
        - artifacts/8k_summary.json
      prompt: |
        I have collected comprehensive information on ${ticker} in the directory ${workdir}.

        IMPORTANT: Read the style guide at ../../STYLE.md before writing. Follow its formatting conventions, source reliability hierarchy, and naming conventions.

        All research data you need is provided in the inline artifacts above and in the artifacts/ directory.
        Use Read and Grep tools to access larger files not included inline.
        Do not attempt external research — synthesize from the provided data only.

        Write Section 3 of an equity research report on ${ticker}: Business Model.

        Cover:
        • Describe their core businesses, products and services.
        • Outline their key revenue streams, customer segments, and monetization strategies.
        • Analyze key characteristics of markets it operates in:
          - customer acquisition costs
          - retention metrics
          - sales cycles
          - seasonal or cyclical business patterns
          - margins, market size, growth trajectory and factors affecting them
        • Explain sources of competitive advantage such as network effects, switching costs, brands, intellectual property, regulatory moats, and other barriers to entry.

        Use a straightforward, factual tone throughout the analysis. Focus on data and observable facts rather than speculation.

        Save results in markdown format to drafts/section_3_business_model.md
      n_iterations: 1
      critic_prompt: |
        Read the draft section at ${draft_path} carefully and critique it for an equity research report.

        Evaluate for:
        - Clarity and readability
        - Factual accuracy — cross-check claims against data in artifacts/
        - Missing or incomplete analysis
        - Unsupported claims or speculation
        - Repetition
        - Professional tone and formatting
        - Compliance with the style guide at ../../STYLE.md (formatting conventions, source hierarchy, naming)

        Write a numbered list of specific issues to address, ordered by importance.
        For each issue, explain what's wrong and suggest how to fix it.

        Save your critique to ${critique_path}.
      rewrite_prompt: |
        Read the current draft at ${draft_path} and the critique at ${critique_path}.

        Address each issue identified in the critique:
        - Improve clarity and readability
        - Remove repetition
        - Fix factual inaccuracies using data from artifacts/
        - Elaborate on incomplete analysis using existing artifacts
        - Remove or substantiate unsupported claims
        - Ensure professional tone
        - Follow the style guide at ../../STYLE.md

        Do not introduce new research. Use existing artifacts to resolve issues.
        If you cannot verify a claim from the artifacts, make the language more hedged or remove it.

        Save the revised section to ${rewrite_path}.
      critic_model: claude-sonnet-4-6
      rewrite_model: claude-sonnet-4-6
      critic_disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      rewrite_disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
    outputs:
      section: {path: "artifacts/section_3_business_model.md", format: md, description: "Section 3: Business model analysis covering products, revenue streams, market characteristics, and competitive advantages"}

  write_competitive:
    sort_order: 10
    description: "Write Section 4: Competitive Landscape"
    type: claude
    depends_on: [profile, technical, fundamental, perplexity, fetch_edgar, wikipedia, perplexity_analysis]
    config:
      system: "You are a senior equity research analyst writing a professional report. Read and follow the style guide at ../../STYLE.md."
      disallowed_tools: [WebSearch, WebFetch, Agent, Skill, Bash, yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      artifacts_inline:
        - artifacts/manifest.json
        - artifacts/profile.json
        - artifacts/peers_list.json
        - artifacts/key_ratios.csv
        - artifacts/income_statement.csv
        - artifacts/balance_sheet.csv
        - artifacts/cash_flow.csv
        - artifacts/analyst_recommendations.json
        - artifacts/technical_analysis.json
        - artifacts/news_stories.md
        - artifacts/8k_summary.json
      prompt: |
        I have collected comprehensive information on ${ticker} in the directory ${workdir}.

        IMPORTANT: Read the style guide at ../../STYLE.md before writing. Follow its formatting conventions, source reliability hierarchy, and naming conventions.

        All research data you need is provided in the inline artifacts above and in the artifacts/ directory.
        Use Read and Grep tools to access larger files not included inline.
        Do not attempt external research — synthesize from the provided data only.

        Write Section 4 of an equity research report on ${ticker}: Competitive Landscape.

        Cover:
        • Identify their main competitors, including direct, adjacent, and emerging competitors.
        • Compare key metrics such as market share, product differentiation, pricing power, and growth trajectories.

        Use a straightforward, factual tone throughout the analysis. Focus on data and observable facts rather than speculation.

        Save results in markdown format to drafts/section_4_competitive.md
      n_iterations: 1
      critic_prompt: |
        Read the draft section at ${draft_path} carefully and critique it for an equity research report.

        Evaluate for:
        - Clarity and readability
        - Factual accuracy — cross-check claims against data in artifacts/
        - Missing or incomplete analysis
        - Unsupported claims or speculation
        - Repetition
        - Professional tone and formatting
        - Compliance with the style guide at ../../STYLE.md (formatting conventions, source hierarchy, naming)

        Write a numbered list of specific issues to address, ordered by importance.
        For each issue, explain what's wrong and suggest how to fix it.

        Save your critique to ${critique_path}.
      rewrite_prompt: |
        Read the current draft at ${draft_path} and the critique at ${critique_path}.

        Address each issue identified in the critique:
        - Improve clarity and readability
        - Remove repetition
        - Fix factual inaccuracies using data from artifacts/
        - Elaborate on incomplete analysis using existing artifacts
        - Remove or substantiate unsupported claims
        - Ensure professional tone
        - Follow the style guide at ../../STYLE.md

        Do not introduce new research. Use existing artifacts to resolve issues.
        If you cannot verify a claim from the artifacts, make the language more hedged or remove it.

        Save the revised section to ${rewrite_path}.
      critic_model: claude-sonnet-4-6
      rewrite_model: claude-sonnet-4-6
      critic_disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
      rewrite_disallowed_tools: [yfinance, alphavantage, brave-search, perplexity-ask, wikipedia, playwright, fetch, filesystem]
    outputs:
      section: {path: "artifacts/section_4_competitive.md", format: md, description: "Section 4: Competitive landscape covering competitors, market share, differentiation, and growth trajectories"}

  write_supply_chain:
    sort_order: 11
    description: "Write Section 5: Supply Chain Positioning"
    type: claude
    depends_on: [profile, technical, fundamental, perplexity, fetch_edgar, wikipedia, perplexity_analysis]
    config:
      system: "You are a senior equity research analyst writing a professional report. Read and follow the style guide at ../../STYLE.md."
