  cross_check:
    sort_order: 37
    description: Cross-section consistency check across all written sections
    type: claude
    depends_on: [write_profile, write_business_model, write_competitive, write_supply_chain, write_financial, write_valuation, write_risk_news]
    config:
      system: "You are a senior equity research editor specializing in report consistency and accuracy."
      model: claude-sonnet-4-6
      max_budget_usd: 0.50
      disallowed_tools: [WebSearch, WebFetch, Agent, Skill, Bash, yfinance, alphavantage, brave-search, wikipedia, openbb-mcp, playwright, fetch, filesystem]
      artifacts_inline:
        - artifacts/manifest.json
        - artifacts/profile.json
        - artifacts/key_ratios.csv
      prompt: |
        Read all 7 section artifacts:
        - artifacts/section_1_profile.md
        - artifacts/section_2_business_model.md
        - artifacts/section_3_competitive.md
        - artifacts/section_4_supply_chain.md
        - artifacts/section_5_financial.md
        - artifacts/section_6_valuation.md
        - artifacts/section_7_risk_news.md

        Also read the inline structured data for reference.

        Perform a cross-section consistency check:

        1. **Number consistency**: Are the same figures (revenue, margins, market share,
           employee count, market cap) consistent across all sections? Flag any section
           that uses a different number for the same metric.

        2. **Narrative consistency**: Do any sections contradict each other? For example,
           does the profile section describe a growth story while the financial section
           paints a picture of decline?

        3. **Redundancy**: Are there paragraphs or analyses that are substantially
           duplicated across sections? Flag specific passages.

        4. **Gap check**: Are there important topics mentioned in one section's data
           that are absent from the section where they should be covered?

        Output a JSON file with this structure:
        {
          "number_inconsistencies": [
            {"metric": "...", "sections": {"section_1": "value", "section_5": "different value"}, "recommended": "..."}
          ],
          "contradictions": [
            {"topic": "...", "section_a": "...", "section_b": "...", "detail": "..."}
          ],
          "redundancies": [
            {"topic": "...", "sections": ["section_1", "section_2"], "recommendation": "keep in section_X, reference from section_Y"}
          ],
          "gaps": [
            {"topic": "...", "missing_from": "section_X", "found_in": "section_Y"}
          ]
        }

        Save to artifacts/cross_check.json
    outputs:
      cross_check: {path: "artifacts/cross_check.json", format: json, description: "Cross-section consistency check results: number mismatches, contradictions, redundancies, and gaps"}

